<!DOCTYPE html>
<html>
<head>
    <title>School Login Demo</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 100px auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #4285f4; color: white; padding: 12px; border: none; width: 100%; }
    </style>
</head>
<body>
    <h2>School Portal Login</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Demo only - shows data locally, doesn't send anywhere
            alert(`Demo Login: ${username}`);
            console.log('Username:', username, 'Password:', password);
        });
    </script>
</body>
</html>
